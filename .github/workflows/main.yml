name: FIREST PROJECT
on:
  push:
    branches:
      - "feature**"
 # pull_request:
#    branches:
    #  - master
jobs:
  first http pro:
    runs-on: ubuntu-latest
    steps:
      - name: clone code
        uses: actions/sheckout@v5

      - name: setup env node js 
        uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: npm install packages
        run: "npm install"

      - name: build project
        run: npm run build
    
