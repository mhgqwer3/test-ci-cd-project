name: FIRST PROJECT

on:
  push:
    branches:
      - "feature**"

# pull_request:
#   branches:
#     - master

jobs:
  first-http-pro:
    runs-on: ubuntu-latest

    steps:
      - name: Clone code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install packages
        run: npm install

      - name: Build project 5
        run: npm run build
